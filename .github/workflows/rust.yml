name: Rust

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3
    - name: Install wasm32
      run: rustup target add wasm32-unknown-unknown
    - name: Cargo install
      run: cargo install --locked tickbox cargo-deny
    - name: Build
      run: cargo build --verbose
    - name: Run tests
      run: CLEANUP=true tickbox --dir tickbox/pre-commit --disable-tui
