[package]
name = "rtlsdr-pure"
version = "0.1.0"
edition = "2024"
description = "Pure Rust RTL-SDR driver using cross_usb for native USB and WebUSB"
license = "GPL"
authors = ["Thomas Habets <thomas@habets.se>"]
readme = "README.md"
repository = "https://github.com/ThomasHabets/rtlsdr-pure"
description = "RTL-SDR library implemented in pure Rust"
keywords = ["radio"]

[dependencies]
cross_usb = "0.4.1"

[target.'cfg(target_family = "wasm")'.dependencies]
js-sys = "=0.3.77"
wasm-bindgen = "=0.2.100"
wasm-bindgen-futures = "=0.4.50"
web-sys = "=0.3.77"

[dev-dependencies]
futures-lite = "2.6.1"
